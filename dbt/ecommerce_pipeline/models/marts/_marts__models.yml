version: 2

models:
  - name: fct_orders
    columns: 
      - name: order_id
        data_tests:
          - unique
          - not_null

  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
         - unique
         - not_null
      - name: total_spend
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
